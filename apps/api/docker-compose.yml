version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: elbunker-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: elbunker
      POSTGRES_USER: elbunker
      POSTGRES_PASSWORD: elbunker_dev_2026
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U elbunker"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
